<h1>California House Price Prediction</h1>

<form action="{{ url_for('predict') }}" method="post">

    <input type="text" name="MedInc" placeholder="Median Income" required="required"/><br><br>

    <input type="text" name="HouseAge" placeholder="House Age" required="required"/><br><br>

    <input type="text" name="AveRooms" placeholder="Average Rooms" required="required"/><br><br>

    <input type="text" name="AveBedrms" placeholder="Average Bedrooms" required="required"/><br><br>

    <input type="text" name="Population" placeholder="Population" required="required"/><br><br>

    <input type="text" name="AveOccup" placeholder="Average Occupancy" required="required"/><br><br>

    <input type="text" name="Latitude" placeholder="Latitude" required="required"/><br><br>

    <input type="text" name="Longitude" placeholder="Longitude" required="required"/><br><br>

    <button type="submit">Predict House Price</button>

</form>

<br><br>

<h2>{{ prediction_text }}</h2>
